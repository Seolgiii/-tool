<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>수출 정산서</title>

  <!-- PDF 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    td, th {
      border: 1px solid #000;
      padding: 8px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h2>수출 정산서</h2>
  <style>
    <button onclick="downloadPDF()">PDF 저장</button>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align: center;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}
td, th {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}
input {
  width: 95%;
  padding: 5px;
}
.highlight {
  background: yellow;
  font-weight: bold;
}
.total {
  font-size: 18px;
  font-weight: bold;
  text-align: right;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>수출 정산서</h1>

날짜: <input type="date"><br>
품목: <input type="text" placeholder="예: 고등어"><br>

<table>
<tr>
  <th>순중량(kg)</th>
  <th>총중량(kg)</th>
  <th>박스 수</th>
</tr>
<tr>
  <td><input type="number" id="nw" oninput="calc()"></td>
  <td><input type="number"></td>
  <td><input type="number"></td>
</tr>
</table>

<table>
<tr>
  <th>수출단가(¥/kg)</th>
  <th>수출 금액(¥)</th>
</tr>
<tr>
  <td><input type="number" id="price" oninput="calc()"></td>
  <td class="highlight" id="yenTotal">0</td>
</tr>
</table>

<table>
<tr>
  <th>환율</th>
  <th>원화 금액</th>
</tr>
<tr>
  <td><input type="number" id="rate" oninput="calc()"></td>
  <td class="highlight" id="krwTotal">0</td>
</tr>
</table>

<h3>비용 입력</h3>
<table>
<tr>
  <th>항목</th>
  <th>내용</th>
  <th>금액</th>
</tr>

<tr>
  <td>어대금</td>
  <td><input type="text" placeholder="예: 1미당 단가"></td>
  <td><input type="number" class="cost" oninput="calc()"></td>
</tr>

<tr>
  <td>창고료</td>
  <td><input type="text" placeholder="입/출고료"></td>
  <td><input type="number" class="cost subCost" oninput="calc()"></td>
</tr>

<tr>
  <td>작업비</td>
  <td><input type="text" placeholder="박스당 비용"></td>
  <td><input type="number" class="cost subCost" oninput="calc()"></td>
</tr>

<tr>
  <td>부자재</td>
  <td><input type="text" placeholder="아이스팩 등"></td>
  <td><input type="number" class="cost subCost" oninput="calc()"></td>
</tr>

<tr>
  <td>항공 운임</td>
  <td><input type="text" placeholder="항공 비용"></td>
  <td><input type="number" class="cost subCost" oninput="calc()"></td>
</tr>

<tr>
  <td>해상 운임</td>
  <td><input type="text" placeholder="해상 비용"></td>
  <td><input type="number" class="cost subCost" oninput="calc()"></td>
</tr>

<tr>
  <td>통관비</td>
  <td><input type="text" placeholder="통관 비용"></td>
  <td><input type="number" class="cost subCost" oninput="calc()"></td>
</tr>

</table>

<div class="total">
경비 소계: <span id="subTotal">0</span> 원
</div>

<div class="total">
수출 원가: <span id="totalCost">0</span> 원
</div>

<div class="total">
kg당 원가: <span id="costPerKg">0</span> 원/kg
</div>

<div class="total">
손익: <span id="profit">0</span> 원
</div>

<script>
function calc() {
  const nw = Number(document.getElementById("nw").value);
  const price = Number(document.getElementById("price").value);
  const rate = Number(document.getElementById("rate").value);

  const yen = nw * price || 0;
  document.getElementById("yenTotal").innerText = yen.toLocaleString();

  const krw = yen * rate || 0;
  document.getElementById("krwTotal").innerText = krw.toLocaleString();

  let subTotal = 0;
  document.querySelectorAll(".subCost").forEach(el => {
    subTotal += Number(el.value) || 0;
  });

  document.getElementById("subTotal").innerText = subTotal.toLocaleString();

  let totalCost = 0;
  document.querySelectorAll(".cost").forEach(el => {
    totalCost += Number(el.value) || 0;
  });

  document.getElementById("totalCost").innerText = totalCost.toLocaleString();

  const costPerKg = nw ? totalCost / nw : 0;
  document.getElementById("costPerKg").innerText = Math.round(costPerKg).toLocaleString();

  const profit = krw - totalCost;
  document.getElementById("profit").innerText = profit.toLocaleString();
}
</script>
<script>
function downloadPDF() {
  const { jsPDF } = window.jspdf;

  html2canvas(document.body).then(canvas => {
    const imgData = canvas.toDataURL("image/png");
    const pdf = new jsPDF();

    const imgWidth = 210;
    const pageHeight = 295;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
    pdf.save("estimate.pdf");
  });
}
</script>
</body>
</html>
